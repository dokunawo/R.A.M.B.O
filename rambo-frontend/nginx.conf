server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes (/console, /agent/*, /council, /learning)
    # must serve index.html instead of 404 on direct load or refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; never cache index.html.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
