services:
  rambo-backend:
    build:
      context: ./rambo-backend
      dockerfile: Dockerfile
    container_name: rambo-backend
    ports:
      - "8000:8000"
    volumes:
      - ./rambo-backend:/app
      # Full tree + .git, WRITABLE — read-only self-awareness (codebase_skill) plus
      # the self-coding dev lane, which needs to create branches/worktrees, commit,
      # and merge here. The dev lane never touches the live process directly: it
      # works in an isolated worktree (off-mount, see RAMBO_WORKTREE_DIR) and only
      # writes to this tree on an operator-approved merge.
      - ./:/repo:rw
    environment:
      # Point the dev lane at the writable full-repo mount (where .git lives).
      - RAMBO_REPO_ROOT=/repo
      # Keep worktrees off the bind mount so they don't clutter the host tree.
      - RAMBO_WORKTREE_DIR=/tmp/rambo-worktrees
    # Dev convenience: auto-restart uvicorn on .py edits (source is volume-mounted
    # above). Overrides the Dockerfile CMD, which stays the clean prod default.
    # Needs watchfiles → requirements pins uvicorn[standard].
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  rambo-frontend:
    build:
      context: ./rambo-frontend
      dockerfile: Dockerfile
    container_name: rambo-frontend
    ports:
      - "3000:80"        # Production frontend
    restart: unless-stopped

  rambo-frontend-dev:
    # DORMANT by default. Everyday use is prod (:3000) only — this dev/hot-reload
    # server is gated behind the "dev" compose profile so `docker compose up -d`
    # (and rambo-startup.ps1) never start it. Bring it up ONLY when editing:
    #   docker compose --profile dev up -d rambo-frontend-dev
    # or run rambo-startup.ps1 -Dev.
    profiles: ["dev"]
    build:
      context: ./rambo-frontend
      dockerfile: Dockerfile.dev
    container_name: rambo-frontend-dev
    ports:
      - "3001:3000"      # Dev frontend (hot reload) → on 3001
    volumes:
      - ./rambo-frontend:/app
      - /app/node_modules
    environment:
      # CRA 5 / webpack 5 watches via watchpack, NOT chokidar — on Docker/Windows
      # the source bind mount needs WATCHPACK_POLLING or saves never recompile
      # (the build goes stale and edits silently never reach the :3001 bundle).
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      # The HMR client is served on host :3001 (container :3000); tell it so it
      # stops failing to reach ws://localhost:3000/ws and hot reload actually works.
      - WDS_SOCKET_PORT=3001
    restart: unless-stopped
